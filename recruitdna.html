<!DOCTYPE html>

<body>

      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [showAddClient, setShowAddClient] = useState(false);
      const [expandedCandidate, setExpandedCandidate] = useState(null);
      const [jobFilter, setJobFilter] = useState('all');
      const [matchFilter, setMatchFilter] = useState('all');
      const [clientFilter, setClientFilter] = useState('all');

      const mockClients = [
        { id: 1, company: 'TechFlow Inc', contact: 'Sarah Chen', email: 'sarah@techflow.com', tier: 'Enterprise', status: 'active', rate: 600, filters: 12 },
        { id: 2, company: 'Data Systems Corp', contact: 'John Martinez', email: 'john@datasys.com', tier: 'Pro', status: 'active', rate: 400, filters: 8 },
    = useState('dashboard');
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [showAddClient, setShowAddClient] = useState(false);
      const [expandedCandidate, setExpandedCandidate] = useState(null);

        { id: 2, company: 'Data Systems Corp', contact: 'John Martinez', email: 'john@datasys.com', tier: 'Pro', status: 'active', rate: 400, filters: 8 },
        { id: 3, company: 'Cloud Ventures', contact: 'Emily Rodriguez', email: 'emily@cloud.com', tier: 'Starter', status: 'trial', rate: 250, filters: 4 },
        { id: 4, company: 'AI Innovations Ltd', contact: 'Michael Park', email: 'michael@aiinnovations.com', tier: 'Enterprise', status: 'active', rate: 600, filters: 15 },
        { id: 5, company: 'Byte Solutions', contact: 'Lisa Zhang', email: 'lisa@bytesol.com', tier: 'Pro', status: 'paused', rate: 400, filters: 6 },
        { id: 6, company: 'NextGen Tech', contact: 'David Thompson', email: 'david@nextgen.com', tier: 'Starter', status: 'active', rate: 250, filters: 3 },
        { id: 7, company: 'Digital Forge', contact: 'Jessica Wong', email: 'jessica@digitalforge.com', tier: 'Pro', status: 'active', rate: 400, filters: 9 },
        { id: 8, company: 'Prime Recruiting', contact: 'Robert Johnson', email: 'robert@prime.com', tier: 'Enterprise', status: 'cancelled', rate: 600, filters: 0 },

            </div>

        </div>

                      <p className="text-slate-500 text-sm">{row.clients} active clients</p>

              </tbody>
            </table>

        </div>

      const JobsView = () => (
        <div className="space-y-6">
          <div>
            <h2 className="text-3xl font-bold text-white mb-4">Jobs</h2>
            <select
              value={jobFilter}
              onChange={(e) => setJobFilter(e.target.value)}
              className="bg-slate-800 border border-slate-700 rounded px-4 py-2 text-white"
            >
              <option value="all">All Sources</option>
              <option value="LinkedIn">LinkedIn</option>
              <option value="Indeed">Indeed</option>
              <option value="ZipRecruiter">ZipRecruiter</option>
            </select>
          </div>

          <div className="bg-slate-900/50 border border-slate-800 rounded-lg overflow-hidden">
            <table className="w-full text-sm">
              <thead className="border-b border-slate-800 bg-slate-800/50">
                <tr>
                  <th className="px-6 py-3 text-left text-slate-300 font-semibold">Title</th>
                  <th className="px-6 py-3 text-left text-slate-300 font-semibold">Company</th>
                  <th className="px-6 py-3 text-left text-slate-300 font-semibold">Location</th>

                    <td className="px-6 py-4"><span className="bg-indigo-900 text-indigo-200 px-3 py-1 rounded text-xs font-medium">{job.source}</span></td>

            <h2 className="text-3xl font-bold text-white mb-4">Matches</h2>
            <div className="flex gap-4">
              <select
                value={clientFilter}
                onChange={(e) => setClientFilter(e.target.value)}
                className="bg-slate-800 border border-slate-700 rounded px-4 py-2 text-white"
              >
                <option value="all">All Clients</option>
                {mockClients.map(c => <option key={c.id} value={c.id}>{c.company}</option>)}

              <select
                value={matchFilter}
                onChange={(e) => setMatchFilter(e.target.value)}
                className="bg-slate-800 border border-slate-700 rounded px-4 py-2 text-white"

                <tr>
                  <th className="px-6 py-3 text-left text-slate-300 font-semibold">Job</th>
                  <th className="px-6 py-3 text-left text-slate-300 font-semibold">Candidate</th>

                  <th className="px-6 py-3 text-left text-slate-300 font-semibold">Status</th>

                  const candidate = mockCandidates.find(c => c.id === match.candidateId);
                  return (
                    <tr key={match.id} className="hover:bg-slate-800/30 transition">

                      <td className="px-6 py-4">{candidate?.name}</td>

                  className="w-full px-6 py-4 hover:bg-slate-800/50 transition text-left flex items-center justify-between"

                      <p className="text-white">{candidate.location}</p>

                      <p className="text-slate-400 text-sm font-medium mb-2">Skills</p>
                      <div className="flex flex-wrap gap-2">

                          <              </tr>

                value={matchFilter}

          </div>

          <div className="bg-slate-900/50 border border-slate-800 rounded-lg overflow-hidden">
            <table className="w-full text-sm">
              <thead className="border-b border-slate-800 bg-slate-800/50">
                <tr>
                  <th className="px-6 py-3 text-left text-slate-300 font-semibold">Job</th>
                  <th className="px-6 py-3 text-left text-slate-300 font-semibold">Candidate</th>
                  <th className="px-6 py-3 text-left text-slate-300 font-semibold">Match Score</th>
                  <th className="px-6 py-3 text-left text-slate-300 font-semibold">Status</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-800">
                {filteredMatches.map(match => {
                  const job = mockJobs.find(j => j.id === match.jobId);
                  const candidate = mockCandidates.find(c => c.id === match.candidateId);
                  return (
                    <tr key={match.id} className="hover:bg-slate-800/30 transition">
                      <td className="px-6 py-4 font-medium text-sm">{job?.title}</td>
                      <td className="px-6 py-4">{candidate?.name}</td>
                      <td className="px-6 py-4"><span className="bg-green-900 text-green-200 px-3 py-1 rounded font-medium">{match.score}%</span></td>
                      <td className="px-6 py-4">{match.delivered ? <span className="text-green-400">Delivered</span> : <span className="text-yellow-400">Pending</span>}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );

      const CandidatesView = () => (
        <div className="space-y-6">
          <h2 className="text-3xl font-bold text-white">Candidates</h2>

          <div className="space-y-4">
            {filteredCandidates.map(candidate => (
              <div key={candidate.id} className="bg-slate-900/50 border border-slate-800 rounded-lg overflow-hidden">
                <button
                  onClick={() => setExpandedCandidate(expandedCandidate === candidate.id ? null : candidate.id)}
                  className="w-full px-6 py-4 hover:bg-slate-800/50 transition text-left flex items-center justify-between"
                >
                  <div>
                    <h3 className="font-semibold text-white">{candidate.name}</h3>
                    <p className="text-sm text-slate-400">{candidate.title} at {candidate.company}</p>
                  </div>
                  <div className="text-indigo-400">⭐ {candidate.rating}</div>
                </button>
                {expandedCandidate === candidate.id && (
                  <div className="px-6 py-4 bg-slate-800/30 border-t border-slate-800 space-y-4">
                    <div>
                      <p className="text-slate-400 text-sm font-medium mb-2">Location</p>
                      <p className="text-white">{candidate.location}</p>
                    </div>
                    <div>
                      <p className="text-slate-400 text-sm font-medium mb-2">Skills</p>
                      <div className="flex flex-wrap gap-2">
                        {candidate.skills.map(skill => (
                          <span key={skill} className="bg-indigo-900 text-indigo-200 px-3 py-1 rounded text-xs font-medium">{skill}</span>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );

      const SettingsView = () => (
        <div className="space-y-6">
          <h2 className="text-3xl font-bold text-white">Settings</h2>

          <div className="bg-slate-900/50 border border-slate-800 rounded-lg p-6 space-y-6">
            <div>
              <h3 className="text-lg font-bold text-white mb-4">API Keys</h3>
              <div className="space-y-3">
                <div>
                  <p className="text-slate-400 text-sm mb-1">LinkedIn API Key</p>
                  <div className="flex gap-2">
                    <input type="password" value="••••••••••••••••" readOnly className="flex-1 bg-slate-800 border border-slate-700 rounded px-4 py-2 text-slate-400" />
                    <button className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded transition">Rotate</button>
                  </div>
                </div>
                <div>
                  <p className="text-slate-400 text-sm mb-1">Indeed API Key</p>
                  <div className="flex gap-2">
                    <input type="password" value="••••••••••••••••" readOnly className="flex-1 bg-slate-800 border border-slate-700 rounded px-4 py-2 text-slate-400" />
                    <button className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded transition">Rotate</button>
                  </div>
                </div>
              </div>
            </div>

            <div className="border-t border-slate-700 pt-6">
              <h3 className="text-lg font-bold text-white mb-4">Preferences</h3>
              <div className="space-y-3">
                <label className="flex items-center gap-3 cursor-pointer">
                  <input type="checkbox" defaultChecked className="w-4 h-4 rounded" />
                  <span className="text-slate-300">Email notifications for new matches</span>
                </label>
                <label className="flex items-center gap-3 cursor-pointer">
                  <input type="checkbox" defaultChecked className="w-4 h-4 rounded" />
                  <span className="text-slate-300">Weekly performance reports</span>
                </label>
                <label className="flex items-center gap-3 cursor-pointer">
                  <input type="checkbox" className="w-4 h-4 rounded" />
                  <span className="text-slate-300">Marketing updates</span>
                </label>
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="flex h-screen bg-slate-950">
          <Sidebar />

          <div className="flex-1 overflow-auto">
            <div className="p-8">
              <div className="mb-6">
                <a href="./index.html" className="text-indigo-400 hover:text-indigo-300 text-sm font-medium flex items-center gap-1">
                  ← Back to Passive Stack
                </a>
              </div>

              {activeTab === 'dashboard' && <DashboardView />}
              {activeTab === 'clients' && <ClientsView />}
              {activeTab === 'jobs' && <JobsView />}
              {activeTab === 'matches' && <MatchesView />}
              {activeTab === 'candidates' && <CandidatesView />}
              {activeTab === 'settings' && <SettingsView />}
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RecruitDNAAdmin />);
  </script>
</body>
</html>
