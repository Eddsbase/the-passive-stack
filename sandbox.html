<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox — Connecting Companies and Creators</title>

    <!-- Google Fonts Fallbacks -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Fontshare Fonts (Primary) -->
    <link rel="preconnect" href="https://api.fontshare.com/">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Typography System */
        html {
            font-size: 16px;
        }

        @media (max-width: 768px) {
            html {
                font-size: 14px;
            }
        }

        body {
            font-family: 'Satoshi', 'DM Sans', sans-serif;
            background-color: #FAFAFA;
            color: #111111;
            line-height: 1.6;
            letter-spacing: 0.3px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Clash Display', 'Space Grotesk', sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        h1 { font-size: 4rem; }
        h2 { font-size: 3rem; }
        h3 { font-size: 2rem; }
        h4 { font-size: 1.5rem; }

        .mono {
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.05em;
        }

        .hero-text {
            font-size: 5.5rem;
            font-weight: 700;
            line-height: 1;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            h2 { font-size: 1.75rem; }
            h3 { font-size: 1.5rem; }
            .hero-text { font-size: 3rem; }
        }

        /* Spacing */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(250, 250, 250, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 2px solid #111111;
            padding: 1rem 2rem;
        }

        .nav-container {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
        }

        .logo {
            font-family: 'Clash Display', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            text-decoration: none;
            color: #111111;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #111111;
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .nav-links a:hover {
            color: #FF6B35;
        }

        .nav-auth {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 600;
            border: 2px solid #111111;
            background: transparent;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .nav-btn:hover {
            background: #111111;
            color: #FAFAFA;
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: #111111;
            margin: 6px 0;
            transition: 0.3s;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .nav-auth {
                display: none;
            }
            .hamburger {
                display: block;
            }
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding-top: 80px;
            background: linear-gradient(135deg, #FAFAFA 0%, #f5f5f5 100%);
        }

        .hero-blob {
            position: absolute;
            border-radius: 45% 55% 60% 40% / 55% 45% 55% 60%;
            background: linear-gradient(135deg, #FF6B35 0%, #8B5CF6 50%, #3B82F6 100%);
            width: 400px;
            height: 400px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.15;
            animation: blob 15s infinite;
            z-index: 1;
        }

        @keyframes blob {
            0%, 100% { border-radius: 45% 55% 60% 40% / 55% 45% 55% 60%; }
            50% { border-radius: 40% 60% 50% 50% / 50% 50% 60% 40%; }
        }

        .hero-content {
            text-align: center;
            z-index: 2;
            position: relative;
        }

        .hero-title {
            font-size: 6rem;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            line-height: 1;
        }

        .hero-tagline {
            font-size: 1.25rem;
            color: #666666;
            margin-bottom: 3rem;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.05em;
        }

        .hero-badges {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .badge {
            padding: 0.75rem 1.5rem;
            border: 2px solid #111111;
            background: transparent;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            transform: rotate(-1deg);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .badge:nth-child(2) {
            transform: rotate(1deg);
            border-color: #FF6B35;
        }

        .badge:nth-child(3) {
            transform: rotate(-0.5deg);
            border-color: #8B5CF6;
        }

        .badge:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .hero-ctas {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 3px solid;
            cursor: pointer;
            letter-spacing: 0.05em;
            font-family: 'Clash Display', sans-serif;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: inline-block;
        }

        .btn-primary {
            background: #FF6B35;
            border-color: #FF6B35;
            color: #FAFAFA;
        }

        .btn-primary:hover {
            background: #FAFAFA;
            color: #FF6B35;
        }

        .btn-secondary {
            background: #8B5CF6;
            border-color: #8B5CF6;
            color: #FAFAFA;
        }

        .btn-secondary:hover {
            background: #FAFAFA;
            color: #8B5CF6;
        }

        .btn-outline {
            background: transparent;
            border-color: #111111;
            color: #111111;
        }

        .btn-outline:hover {
            background: #111111;
            color: #FAFAFA;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
            z-index: 2;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        /* Stats Bar */
        .stats-bar {
            background: #1A1A1A;
            color: #FAFAFA;
            padding: 3rem 2rem;
            border-top: 3px solid #FF6B35;
            border-bottom: 3px solid #8B5CF6;
        }

        .stats-container {
            max-width: 1440px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .stat {
            border: 2px solid #FF6B35;
            padding: 1.5rem;
        }

        .stat:nth-child(2) { border-color: #8B5CF6; }
        .stat:nth-child(3) { border-color: #3B82F6; }
        .stat:nth-child(4) { border-color: #EF4444; }

        .stat-number {
            font-size: 2.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #AAAAAA;
        }

        /* Sections */
        section {
            padding: 5rem 2rem;
        }

        @media (max-width: 768px) {
            section {
                padding: 3rem 1rem;
            }
        }

        .section-title {
            margin-bottom: 3rem;
            text-align: center;
            text-transform: uppercase;
            font-size: 2.5rem;
            letter-spacing: 0.05em;
        }

        .section-title-line {
            display: inline-block;
            padding-bottom: 1rem;
            border-bottom: 3px solid #FF6B35;
        }

        /* How It Works */
        .how-it-works {
            background: #FAFAFA;
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }

        @media (max-width: 768px) {
            .two-column {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        .column-title {
            font-size: 1.75rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .column-title-orange::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #FF6B35;
        }

        .column-title-purple::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #8B5CF6;
        }

        .steps {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .step {
            display: flex;
            gap: 2rem;
            padding: 1.5rem;
            border: 2px solid #111111;
            background: #FAFAFA;
        }

        .step:nth-child(odd) {
            background: #f5f5f5;
        }

        .step-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            min-width: 40px;
            color: #FF6B35;
        }

        .step:nth-child(even) .step-number {
            color: #8B5CF6;
        }

        .step-content h4 {
            margin-bottom: 0.5rem;
        }

        .step-content p {
            color: #666666;
            font-size: 0.9rem;
        }

        /* Creator Grid */
        .creators-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 3rem;
        }

        @media (max-width: 1024px) {
            .creators-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .creators-grid {
                grid-template-columns: 1fr;
            }
        }

        .creator-card {
            border: 3px solid #111111;
            padding: 2rem;
            background: #FAFAFA;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }

        .creator-card:hover {
            transform: rotate(-1deg) translateY(-5px);
            border-color: #FF6B35;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .creator-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B35 0%, #8B5CF6 100%);
            margin-bottom: 1rem;
            border: 2px solid #111111;
        }

        .creator-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .creator-niche {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .niche-tag {
            padding: 0.35rem 0.75rem;
            border: 2px solid #111111;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            background: transparent;
            cursor: pointer;
        }

        .niche-tag:hover {
            background: #FF6B35;
            color: #FAFAFA;
            border-color: #FF6B35;
        }

        .creator-stats {
            display: flex;
            justify-content: space-between;
            margin: 1.5rem 0;
            padding: 1rem 0;
            border-top: 2px solid #f0f0f0;
            border-bottom: 2px solid #f0f0f0;
        }

        .creator-stat {
            text-align: center;
        }

        .creator-stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .creator-stat-label {
            font-size: 0.75rem;
            color: #666666;
            text-transform: uppercase;
        }

        .creator-tier {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #FF6B35;
            color: #FAFAFA;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .creator-tier.rising {
            background: #3B82F6;
        }

        .creator-tier.established {
            background: #8B5CF6;
        }

        .creator-tier.pro {
            background: #EF4444;
        }

        .creator-tier.elite {
            background: #111111;
            color: #FAFAFA;
        }

        .creator-content-types {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .content-type {
            padding: 0.3rem 0.6rem;
            background: #f0f0f0;
            font-size: 0.7rem;
            border: 1px solid #ddd;
            text-transform: uppercase;
        }

        .creator-rate {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            margin: 1rem 0;
            color: #FF6B35;
        }

        .creator-cta {
            display: block;
            text-align: right;
            text-decoration: none;
            color: #111111;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .creator-cta:hover {
            color: #FF6B35;
            transform: translateX(5px);
        }

        /* For Brands Section */
        .brands-section {
            background: #f5f5f5;
        }

        .brands-highlight {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin-bottom: 3rem;
            align-items: center;
        }

        @media (max-width: 768px) {
            .brands-highlight {
                grid-template-columns: 1fr;
            }
        }

        .brands-text h3 {
            margin-bottom: 1.5rem;
        }

        .brands-text p {
            color: #666666;
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .competitor-comparison {
            background: #FAFAFA;
            border: 3px solid #111111;
            padding: 2rem;
            margin: 2rem 0;
            font-family: 'JetBrains Mono', monospace;
        }

        .competitor-comparison h4 {
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .comparison-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #eee;
        }

        .comparison-item:last-child {
            border-bottom: none;
        }

        .comparison-item.sandbox {
            background: #FFF3E0;
            padding: 1rem;
            margin-top: 1rem;
            border: 2px solid #FF6B35;
        }

        /* Testimonials */
        .testimonials {
            background: #FAFAFA;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 3rem;
        }

        @media (max-width: 1024px) {
            .testimonials-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .testimonials-grid {
                grid-template-columns: 1fr;
            }
        }

        .testimonial-card {
            border: 3px solid #111111;
            padding: 2rem;
            background: #fff;
            position: relative;
            transform: rotate(-1deg);
        }

        .testimonial-card:nth-child(even) {
            transform: rotate(1deg);
        }

        .testimonial-quote {
            font-size: 3rem;
            position: absolute;
            top: 1rem;
            left: 1rem;
            opacity: 0.2;
            font-family: Georgia, serif;
        }

        .testimonial-text {
            margin-bottom: 1.5rem;
            font-size: 1rem;
            line-height: 1.8;
            position: relative;
            z-index: 1;
        }

        .testimonial-author {
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .testimonial-role {
            font-size: 0.85rem;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Pricing */
        .pricing {
            background: #f5f5f5;
        }

        .pricing-preview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin: 3rem 0;
        }

        @media (max-width: 768px) {
            .pricing-preview {
                grid-template-columns: 1fr;
            }
        }

        .pricing-block {
            border: 3px solid #111111;
            padding: 3rem;
            background: #FAFAFA;
        }

        .pricing-block:nth-child(1) {
            border-color: #FF6B35;
        }

        .pricing-block:nth-child(2) {
            border-color: #8B5CF6;
        }

        .pricing-block h3 {
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .pricing-block p {
            color: #666666;
            margin-bottom: 2rem;
            line-height: 1.8;
        }

        /* Blog Section */
        .blog {
            background: #FAFAFA;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 3rem;
        }

        @media (max-width: 1024px) {
            .blog-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .blog-grid {
                grid-template-columns: 1fr;
            }
        }

        .blog-card {
            border: 3px solid #111111;
            padding: 2rem;
            background: #fff;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }

        .blog-card:hover {
            transform: rotate(-1deg) translateY(-5px);
            border-color: #FF6B35;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .blog-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #FF6B35;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .blog-title {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .blog-excerpt {
            color: #666666;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .blog-category {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: #f0f0f0;
            font-size: 0.75rem;
            text-transform: uppercase;
            border: 1px solid #ddd;
        }

        /* Newsletter */
        .newsletter {
            background: linear-gradient(135deg, #FF6B35 0%, #8B5CF6 100%);
            color: #FAFAFA;
            padding: 5rem 2rem;
        }

        .newsletter-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .newsletter h2 {
            color: #FAFAFA;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .newsletter p {
            color: rgba(255,255,255,0.9);
            margin-bottom: 2rem;
        }

        .newsletter-form {
            display: flex;
            gap: 0;
        }

        .newsletter-form input {
            flex: 1;
            padding: 1rem;
            border: 3px solid #FAFAFA;
            font-family: 'Satoshi', sans-serif;
            font-size: 1rem;
            background: transparent;
            color: #FAFAFA;
        }

        .newsletter-form input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .newsletter-form button {
            padding: 1rem 2rem;
            background: #FAFAFA;
            color: #FF6B35;
            border: 3px solid #FAFAFA;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Clash Display', sans-serif;
            transition: all 0.3s;
        }

        .newsletter-form button:hover {
            background: transparent;
            color: #FAFAFA;
        }

        /* CTA Section */
        .cta-section {
            background: #1A1A1A;
            color: #FAFAFA;
            padding: 5rem 2rem;
            text-align: center;
        }

        .cta-section h2 {
            color: #FAFAFA;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .cta-buttons {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Footer */
        footer {
            background: #1A1A1A;
            color: #FAFAFA;
            padding: 3rem 2rem;
            border-top: 3px solid #FF6B35;
        }

        .footer-content {
            max-width: 1440px;
            margin: 0 auto;
            display: grid;

        // Main App Component
        function App() {
            const [currentPage, setCurrentPage] = useState('home');

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    });
                }, { threshold: 0.1 });

                const elements = document.querySelectorAll('.fade-in-view');
                elements.forEach(el => observer.observe(el));

                return () => elements.forEach(el => observer.unobserve(el));
            }, [currentPage]);

            const pages = {
                home: <HomePage />,
                about: <AboutPage />,
                creators: <CreatorsPage />,
                creator: <CreatorProfile />,
                blog: <BlogPage />,
                post: <BlogPost />,
                pricing: <PricingPage />,
                contact: <ContactPage />,
                services: <ServicesPage />,
                style: <StyleGuidePage />,
                404: <NotFoundPage />,
            };

            return (
                <>
                    <Navigation currentPage={currentPage} setCurrentPage={setCurrentPage} />
                    <main>
                        {pages[currentPage] || pages['404']}
                    </main>
                    <Footer />
                </>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
