<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passive Stack - Passive Income Models That Are Tested And Proven</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-dark-bg: #0a0a0a;
            --color-dark-card: #1a1a1a;
            --color-dark-secondary: #111111;
            --color-emerald: #10b981;
            --color-emerald-dark: #059669;
            --color-amber: #f59e0b;
            --color-text-primary: #ffffff;
            --color-text-secondary: #a0aec0;
            --color-text-tertiary: #718096;
            --color-border: #2d3748;
            --color-border-light: #4a5568;

            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --size-xs: 8px;
            --size-sm: 16px;
            --size-md: 24px;
            --size-lg: 32px;
            --size-xl: 48px;
            --size-2xl: 64px;
            --size-3xl: 96px;
            --size-4xl: 128px;
            --size-5xl: 160px;

            --radius-sharp: 2px;
            --radius-card: 8px;
            --radius-pill: 999px;

            --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --duration-reveal: 600ms;
            --duration-hover: 300ms;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            color: var(--color-text-primary);
            background: linear-gradient(135deg, var(--color-dark-bg) 0%, var(--color-dark-secondary) 100%);
            background-attachment: fixed;
            line-height: 1.6;
            font-size: 16px;
        }

        /* Typography */
        h1 {
            font-family: var(--font-heading);
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        h2 {
            font-family: var(--font-heading);
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        h3 {
            font-family: var(--font-heading);
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        h4 {
            font-family: var(--font-heading);
            font-size: 20px;
            font-weight: 600;
            line-height: 1.4;
        }

        .text-hero {
            font-family: var(--font-heading);
            font-size: clamp(56px, 8vw, 80px);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .text-body {
            font-size: 16px;
            color: var(--color-text-secondary);
            line-height: 1.7;
        }

        .text-small {
            font-size: 14px;
            color: var(--color-text-tertiary);
            line-height: 1.6;
        }

        .text-caption {
            font-size: 12px;
            color: var(--color-text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .text-mono {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 500;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(45, 55, 72, 0);
            z-index: 1000;
            transition: all 300ms var(--ease);
            padding: 0 var(--size-lg);
        }

        nav.scrolled {
            background: rgba(10, 10, 10, 0.9);
            border-bottom-color: var(--color-border);
            backdrop-filter: blur(20px);
        }

        .nav-container {
            max-width: 1440px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--color-text-primary);
        }

        .nav-links {
            display: flex;
            gap: var(--size-xl);
            align-items: center;
        }

        .nav-links a {
            color: var(--color-text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 300ms var(--ease);
            position: relative;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: var(--color-emerald);
        }

        .nav-links a.active {
            color: var(--color-emerald);
        }

        .nav-cta {
            margin-left: var(--size-lg);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background: var(--color-text-primary);
            transition: all 300ms var(--ease);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: var(--radius-pill);
            font-size: 14px;
            font-weight: 600;
            font-family: var(--font-body);
            text-decoration: none;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all var(--duration-hover) var(--ease);
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--color-emerald);
            color: var(--color-dark-bg);
            border-color: var(--color-emerald);
        }

        .btn-primary:hover {
            background: var(--color-emerald-dark);
            border-color: var(--color-emerald-dark);
            transform: translateY(-2px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--color-emerald);
            border-color: var(--color-emerald);
        }

        .btn-ghost:hover {
            background: rgba(16, 185, 129, 0.1);
            transform: translateY(-2px);
        }

        .btn-text {
            background: none;
            color: var(--color-emerald);
            border: none;
            padding: 0;
            font-weight: 600;
        }

        .btn-text:hover {
            color: var(--color-amber);
        }

        /* Containers */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 var(--size-lg);
        }

        section {
            padding: var(--size-4xl) var(--size-lg);
        }

        /* Hero Grid Background */
        .grid-bg {
            position: relative;
            background:
                linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: grid-pulse 8s ease-in-out infinite;
        }

        @keyframes grid-pulse {
            0%, 100% { background-color: var(--color-dark-bg); }
            50% { background-color: rgba(16, 185, 129, 0.01); }
        }

        /* Sections */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding-top: 72px;
        }

        .hero-content {
            max-width: 900px;
        }

        .hero-label {
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--color-emerald);
            margin-bottom: var(--size-lg);
            display: block;
        }

        .hero-title {
            font-size: clamp(48px, 10vw, 80px);
            line-height: 1.15;
            margin-bottom: var(--size-xl);
            animation: fadeInUp 600ms var(--ease) 0ms both;
        }

        .hero-subtitle {
            font-size: 18px;
            color: var(--color-text-secondary);
            margin-bottom: var(--size-3xl);
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.8;
            animation: fadeInUp 600ms var(--ease) 100ms both;
        }

        .hero-ctas {
            display: flex;
            gap: var(--size-lg);
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 600ms var(--ease) 200ms both;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s ease-in-out infinite;
            color: var(--color-emerald);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--size-lg);
            padding: var(--size-2xl) var(--size-lg);
            border-top: 1px solid var(--color-border);
            border-bottom: 1px solid var(--color-border);
            background: rgba(16, 185, 129, 0.02);
            text-align: center;
        }

        .stat-item {
            padding: var(--size-lg) 0;
        }

        .stat-number {
            font-family: var(--font-heading);
            font-size: 36px;
            font-weight: 700;
            color: var(--color-emerald);
            margin-bottom: var(--size-sm);
        }

        .stat-label {
            font-size: 13px;
            color: var(--color-text-secondary);
            font-weight: 500;
        }

        /* Section Header */
        .section-header {
            text-align: center;
            margin-bottom: var(--size-3xl);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .section-title {
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: var(--color-emerald);
        }

        .section-title {
            margin-bottom: var(--size-lg);
        }

        .section-description {
            color: var(--color-text-secondary);
            font-size: 16px;
            line-height: 1.7;
            margin-top: var(--size-lg);
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--size-2xl);
        }

        .card {
            background: var(--color-dark-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            padding: var(--size-2xl);
            transition: all var(--duration-hover) var(--ease);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity var(--duration-hover) var(--ease);
        }

        .card:hover {
            border-color: var(--color-emerald);
            transform: translateY(-4px);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .card-icon {
            font-size: 32px;
            margin-bottom: var(--size-lg);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: var(--size-sm);
        }

        .card-description {
            font-size: 14px;
            color: var(--color-text-secondary);
            line-height: 1.7;
        }

        /* Grid Layouts */
        .three-col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--size-2xl);
            align-items: stretch;
        }

        .two-col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: var(--size-3xl);
            align-items: center;
        }

        /* Project Cards */
        .project-card {
            background: var(--color-dark-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: all var(--duration-hover) var(--ease);
        }

        .project-card:hover {
            border-color: var(--color-emerald);
            transform: translateY(-8px);
        }

        .project-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(245, 158, 11, 0.1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--color-text-tertiary);
        }

        .project-body {
            padding: var(--size-2xl);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .project-meta {
            display: flex;
            gap: var(--size-sm);
            margin-bottom: var(--size-lg);
            flex-wrap: wrap;
        }

        .badge {
            font-size: 11px;
            font-family: var(--font-mono);
            padding: 4px 12px;
            background: rgba(16, 185, 129, 0.15);
            color: var(--color-emerald);
            border-radius: var(--radius-pill);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .badge.revenue {
            background: rgba(245, 158, 11, 0.15);
            color: var(--color-amber);
        }

        .project-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: var(--size-sm);
            flex: 1;
        }

        .project-description {
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-bottom: var(--size-lg);
            flex: 1;
        }

        .project-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--color-emerald);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 300ms var(--ease);
            width: fit-content;
            cursor: pointer;
        }

        .project-link:hover {
            gap: 12px;
            color: var(--color-amber);
        }

        /* Story Section */
        .story-text {
            font-size: 18px;
            line-height: 1.8;
            color: var(--color-text-secondary);
            margin-bottom: var(--size-2xl);
        }

        .quote {
            border-left: 3px solid var(--color-emerald);
            padding-left: var(--size-lg);
            font-size: 18px;
            font-style: italic;
            color: var(--color-text-primary);
            margin: var(--size-2xl) 0;
            font-weight: 500;
        }

        /* Testimonials */
        .testimonial-card {
            background: var(--color-dark-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            padding: var(--size-2xl);
            display: flex;
            flex-direction: column;
        }

        .testimonial-quote {
            font-size: 15px;
            color: var(--color-text-secondary);
            margin-bottom: var(--size-xl);
            line-height: 1.8;
            flex: 1;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: var(--size-lg);
        }

        .testimonial-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-emerald), var(--color-amber));
        }

        .testimonial-info h4 {
            font-size: 14px;
            margin-bottom: 2px;
        }

        .testimonial-role {
            font-size: 12px;
            color: var(--color-text-tertiary);
        }

        /* Blog Grid */
        .blog-card {
            background: var(--color-dark-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: all var(--duration-hover) var(--ease);
            cursor: pointer;
        }

        .blog-card:hover {
            border-color: var(--color-emerald);
            transform: translateY(-4px);
        }

        .blog-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(245, 158, 11, 0.08) 100%);
        }

        .blog-body {
            padding: var(--size-lg);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .blog-category {
            font-size: 11px;
            color: var(--color-emerald);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: var(--size-sm);
        }

        .blog-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: var(--size-sm);
            line-height: 1.5;
            flex: 1;
        }

        .blog-meta {
            display: flex;
            gap: var(--size-lg);
            font-size: 12px;
            color: var(--color-text-tertiary);
        }

        /* Process Timeline */
        .process-steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: var(--size-2xl);
            position: relative;
        }

        .process-step {
            text-align: center;
            position: relative;
            padding: var(--size-lg);
        }

        .process-number {
            font-family: var(--font-heading);
            font-size: 48px;
            font-weight: 700;
            color: var(--color-emerald);
            margin-bottom: var(--size-lg);
        }

        .process-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: var(--size-sm);
        }

        .process-description {
            font-size: 13px;
            color: var(--color-text-secondary);
            line-height: 1.6;
        }

        /* Connector Icons Styles */
        .connector-strip {
            display: flex;
            gap: var(--size-lg);
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: var(--size-2xl) var(--size-lg);
            background: rgba(16, 185, 129, 0.02);
            border-top: 1px solid var(--color-border);
            border-bottom: 1px solid var(--color-border);
        }

        .connector-strip-label {
            font-size: 13px;
            color: var(--color-text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: 100%;
            text-align: center;
            margin-bottom: var(--size-lg);
        }

        .connector-icons {
            display: flex;
            gap: var(--size-lg);
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .connector-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.4;
            transition: opacity var(--duration-hover) var(--ease);
            cursor: pointer;
        }

        .connector-icon:hover {
            opacity: 1;
        }

        .connector-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .connector-icon svg {
            width: 100%;
            height: 100%;
        }

        .connector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: var(--size-2xl);
            padding: var(--size-2xl) 0;
        }

        .connector-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--size-sm);
            text-align: center;
        }

        .connector-item-icon {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
            transition: opacity var(--duration-hover) var(--ease);
        }

        .connector-item:hover .connector-item-icon {
            opacity: 1;
        }

        .connector-item-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .connector-item-icon svg {
            width: 100%;
            height: 100%;
        }

        .connector-item-name {
            font-size: 13px;
            color: var(--color-text-secondary);
            font-weight: 500;
        }

        .card-connectors {
            display: flex;
            gap: var(--size-sm);
            margin-top: var(--size-lg);
            justify-content: flex-start;
            flex-wrap: wrap;
        }

        .card-connector-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
            transition: opacity var(--duration-hover) var(--ease);
        }

        .card-connector-icon:hover {
            opacity: 1;
        }

        .card-connector-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .card-connector-icon svg {
            width: 100%;
            height: 100%;
        }

        /* Newsletter */
        .newsletter-section {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(245, 158, 11, 0.05) 100%);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            padding: var(--size-3xl) var(--size-2xl);
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .newsletter-title {
            font-size: 32px;
            margin-bottom: var(--size-lg);
        }

        .newsletter-description {
            color: var(--color-text-secondary);
            margin-bottom: var(--size-2xl);
        }

        .newsletter-form {
            display: flex;
            gap: var(--size-sm);
            margin-bottom: var(--size-lg);
            flex-wrap: wrap;
            justify-content: center;
        }

        .newsletter-form input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            background: var(--color-dark-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-pill);
            color: var(--color-text-primary);
            font-family: var(--font-body);
            font-size: 14px;
            transition: all 300ms var(--ease);
        }

        .newsletter-form input:focus {
            outline: none;
            border-color: var(--color-emerald);
            background: rgba(16, 185, 129, 0.05);
        }

        .newsletter-form input::placeholder {
            color: var(--color-text-tertiary);
        }

        .newsletter-count {
            font-size: 12px;
            color: var(--color-text-tertiary);
        }

        /* Footer */
        footer {
            background: var(--color-dark-bg);
